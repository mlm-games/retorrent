name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g., 0.1.0)"
        required: true

jobs:
  update-aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux tarballs from release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version_name }}"
          mkdir -p downloads

          # Try both with and without 'v' prefix for release tag
          DOWNLOADED=false
          for TAG in "v$VERSION" "$VERSION"; do
            URL_X64="https://github.com/mlm-games/retorrent/releases/download/${TAG}/retorrent-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
            if curl --output /dev/null --silent --head --fail "$URL_X64"; then
              wget -O "downloads/retorrent-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" "$URL_X64"
              wget -O "downloads/retorrent-${VERSION}-aarch64-unknown-linux-gnu.tar.gz" \
                "https://github.com/mlm-games/retorrent/releases/download/${TAG}/retorrent-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
              DOWNLOADED=true
              break
            fi
          done

          if [[ "$DOWNLOADED" != "true" ]]; then
            echo "Failed to download tarballs"
            exit 1
          fi

      - name: Calculate SHA256 checksums
        id: checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version_name }}"
          X64_TARBALL="downloads/retorrent-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          ARM64_TARBALL="downloads/retorrent-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          X64_HASH=$(sha256sum "$X64_TARBALL" | cut -d ' ' -f 1)
          ARM64_HASH=$(sha256sum "$ARM64_TARBALL" | cut -d ' ' -f 1)
          echo "x64_hash=$X64_HASH"   >> "$GITHUB_OUTPUT"
          echo "arm64_hash=$ARM64_HASH" >> "$GITHUB_OUTPUT"

      - name: Create PKGBUILD
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ inputs.version_name }}"
          pkgver="${ver#v}"
          tag="$ver"
          mkdir -p aur-package
          cat > aur-package/PKGBUILD <<'EOF'
          # Maintainer: MLM-stuff <gfxoxinzh@mozmail.com>
          pkgname=retorrent-bin
          _pkgname=retorrent
          pkgver={{PKGVER}}
          _tag={{TAG}}
          pkgrel=1
          pkgdesc="A BitTorrent client with an alpha/test UI, built in Rust"
          arch=('x86_64' 'aarch64')
          url="https://github.com/mlm-games/retorrent"
          license=('GPL3')
          depends=('glibc')
          provides=('retorrent')
          conflicts=('retorrent')
          options=('!strip')

          source_x86_64=("${_pkgname}-${_tag}-x86_64-unknown-linux-gnu.tar.gz::https://github.com/mlm-games/retorrent/releases/download/${_tag}/${_pkgname}-${_tag}-x86_64-unknown-linux-gnu.tar.gz")
          source_aarch64=("${_pkgname}-${_tag}-aarch64-unknown-linux-gnu.tar.gz::https://github.com/mlm-games/retorrent/releases/download/${_tag}/${_pkgname}-${_tag}-aarch64-unknown-linux-gnu.tar.gz")

          source=("icon.png::https://raw.githubusercontent.com/mlm-games/retorrent/refs/heads/master/fastlane/metadata/android/en-US/images/icon.png")

          sha256sums_x86_64=('{{X64_HASH}}')
          sha256sums_aarch64=('{{ARM64_HASH}}')
          sha256sums=('SKIP') # for icon.png

          package() {
            local target
            if [[ "$CARCH" == "x86_64" ]]; then
              target="x86_64-unknown-linux-gnu"
            else
              target="aarch64-unknown-linux-gnu"
            fi

            local dir="${srcdir}/${_pkgname}-${_tag}-${target}"
            install -Dm755 "${dir}/${_pkgname}" "${pkgdir}/usr/bin/${_pkgname}"

            install -Dm644 /dev/stdin "${pkgdir}/usr/share/applications/${_pkgname}.desktop" << DESKTOP_EOF
          [Desktop Entry]
          Name=Retorrent
          Comment=A semi-modern BitTorrent client
          Exec=${_pkgname} %U
          Icon=${_pkgname}
          Terminal=false
          Type=Application
          Categories=Network;FileTransfer;P2P;
          MimeType=application/x-bittorrent;x-scheme-handler/magnet;
          StartupNotify=true
          StartupWMClass=retorrent
          DESKTOP_EOF

            install -Dm644 "${srcdir}/icon.png" "${pkgdir}/usr/share/pixmaps/${_pkgname}.png"
            install -Dm644 "${srcdir}/icon.png" "${pkgdir}/usr/share/icons/hicolor/256x256/apps/${_pkgname}.png"
          }
          EOF

          sed -i "s/{{PKGVER}}/${pkgver}/g" aur-package/PKGBUILD
          sed -i "s/{{TAG}}/${tag}/g" aur-package/PKGBUILD
          sed -i "s/{{X64_HASH}}/${{ steps.checksums.outputs.x64_hash }}/g" aur-package/PKGBUILD
          sed -i "s/{{ARM64_HASH}}/${{ steps.checksums.outputs.arm64_hash }}/g" aur-package/PKGBUILD

      - name: Publish to AUR
        uses: mlm-games/aur-deploy-action@master
        with:
          pkgname: retorrent-bin
          pkgbuild: aur-package/PKGBUILD
          auto_pkgrel: "true"
          commit_username: MLM-stuff
          commit_email: gfxoxinzh@mozmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ inputs.version_name }}"
